<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rezm.ai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 340px; background: #fff; color: #1a1a2e; }
    .header { padding: 16px; background: linear-gradient(135deg, #1a1a2e, #2d2b55); color: #fff; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header .subtitle { font-size: 11px; opacity: 0.7; }
    .content { padding: 16px; }
    .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .status.connected { background: #ecfdf5; color: #065f46; }
    .status.disconnected { background: #fef2f2; color: #991b1b; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; }
    .status.connected .dot { background: #10b981; }
    .status.disconnected .dot { background: #ef4444; }
    .btn { width: 100%; padding: 10px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; }
    .btn-primary { background: #4338ca; color: #fff; }
    .btn-primary:hover { background: #3730a3; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #f4f4f5; color: #1a1a2e; margin-top: 8px; }
    .btn-secondary:hover { background: #e4e4e7; }
    .btn-accent { background: linear-gradient(135deg, #7c3aed, #4338ca); color: #fff; margin-top: 8px; }
    .btn-accent:hover { background: linear-gradient(135deg, #6d28d9, #3730a3); }
    .btn-accent:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: #fef2f2; color: #991b1b; margin-top: 8px; }
    .btn-danger:hover { background: #fee2e2; }
    .smart-hint { font-size: 11px; color: #6b7280; text-align: center; margin-top: 4px; margin-bottom: 4px; }
    .job-info { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .job-info .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 4px; }
    .job-info .value { font-size: 13px; font-weight: 500; }
    .result { padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; text-align: center; }
    .result.success { background: #ecfdf5; color: #065f46; }
    .result.error { background: #fef2f2; color: #991b1b; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .field-count { font-size: 12px; color: #6b7280; text-align: center; margin-top: 8px; }
    .divider { height: 1px; background: #e5e7eb; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>rezm.ai</h1>
      <div class="subtitle">Smart Apply Extension</div>
    </div>
  </div>

  <div class="content">
    <div id="status-section"></div>
    <div id="action-section"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
